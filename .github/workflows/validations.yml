name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  link-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Build the site
        run: pnpm run build
      - name: Run Playwright link validation tests
        run: pnpm run test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Link validation tests failed. Please check the test report in this workflow run for details.'
            })

  external-link-check:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build the site
        run: pnpm run build
      - name: Check external links with markdown-link-check
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.md |
            Where-Object { $_.FullName -notmatch '\\node_modules\\' } |
            ForEach-Object {
              pnpm dlx markdown-link-check $_.FullName
            }
      - name: Check external links in built HTML
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock { pnpm exec astro preview }
          try {
            Start-Sleep -Seconds 10
            pnpm dlx broken-link-checker http://localhost:4321/workers.github.io -ro --filter-level 2
          } finally {
            Stop-Job $job -ErrorAction SilentlyContinue
            Remove-Job $job -ErrorAction SilentlyContinue
          }
